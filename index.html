<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SNS Spot Map</title>
    <meta name="theme-color" content="#0f8a63" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./list.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-shell" aria-label="SNS 위치 지도">
        <div id="map" class="map-canvas"></div>
        <div id="fallbackMap" class="fallback-map" aria-hidden="true">
          <div class="map-grid"></div>
          <div class="road road-a"></div>
          <div class="road road-b"></div>
          <div class="river"></div>
          <div id="fallbackPins"></div>
        </div>

        <header class="topbar">
          <div>
            <p class="eyebrow">SNS Spot Map</p>
            <h1>링크를 장소에 붙이는 지도</h1>
          </div>
          <div class="top-actions">
            <button id="installButton" class="install-button" type="button" hidden>설치</button>
            <button id="openListButton" class="install-button" type="button">목록</button>
            <button id="openComposer" class="icon-button" type="button" aria-label="콘텐츠 추가">+</button>
          </div>
        </header>

        <div class="filterbar collapsed" role="tablist" aria-label="콘텐츠 유형 필터">
          <button class="filter active" type="button" data-filter="all">전체</button>
          <button class="filter" type="button" data-filter="instagram">Instagram</button>
          <button class="filter" type="button" data-filter="blog">Blog</button>
          <button class="filter" type="button" data-filter="cafe">Cafe</button>
          <button class="filter" type="button" data-filter="other">기타</button>
        </div>

        <aside id="status" class="status-pill"></aside>
        <button id="locateButton" class="map-control-button" type="button" aria-label="현재 위치로 이동">⌖</button>
      </section>

      <section id="detailSheet" class="detail-sheet" aria-live="polite">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <div>
            <p id="selectedType" class="eyebrow">선택된 장소</p>
            <h2 id="selectedTitle">성수 브루잉 라운지</h2>
          </div>
          <a id="selectedLink" class="link-button" href="#" target="_blank" rel="noreferrer">원문</a>
          <button id="editSpotButton" class="secondary-button" type="button">수정</button>
          <button id="deleteSpotButton" class="danger-button" type="button">삭제</button>
        </div>
        <p id="selectedMeta" class="meta"></p>
        <p id="selectedSummary" class="summary"></p>
        <button id="toggleDetailButton" class="ghost-button detail-toggle" type="button">더보기</button>
        <div id="relatedList" class="related-list"></div>
      </section>

      <aside id="spotListPanel" class="spot-list-panel" aria-label="저장한 장소 목록" hidden>
        <div class="list-panel-header">
          <div>
            <p class="eyebrow">내 저장 장소</p>
            <h2>거리순 목록</h2>
          </div>
          <button id="closeListButton" class="ghost-button" type="button">닫기</button>
        </div>
        <input id="spotSearchInput" class="spot-search-input" type="search" placeholder="식당명, 주소, 업종 검색" />
        <p id="spotListMeta" class="meta"></p>
        <div id="spotList" class="spot-list"></div>
      </aside>

      <dialog id="composer" class="composer">
        <form id="spotForm" method="dialog">
          <div class="dialog-header">
            <div>
              <p class="eyebrow">새 콘텐츠</p>
              <h2 id="composerTitle">링크와 위치 등록</h2>
            </div>
            <button class="ghost-button" value="cancel" type="button" id="closeComposer">닫기</button>
          </div>

          <label>
            원문 링크
            <div class="input-action-row">
              <input id="urlInput" name="url" type="url" placeholder="https://www.instagram.com/p/..." required />
              <button id="analyzeLinkButton" class="secondary-button compact-button" type="button">분석</button>
            </div>
          </label>

          <div class="two-col">
            <label>
              제목
              <input id="titleInput" name="title" type="text" placeholder="장소명 또는 글 제목" required />
            </label>
            <label>
              유형
              <select id="typeInput" name="type">
                <option value="instagram">Instagram</option>
                <option value="blog">Naver Blog</option>
                <option value="cafe">Naver Cafe</option>
                <option value="other">기타</option>
              </select>
            </label>
          </div>

          <fieldset class="category-field">
            <legend>업종</legend>
            <div class="category-options">
              <label><input type="checkbox" name="categoryOption" value="korean" />한식</label>
              <label><input type="checkbox" name="categoryOption" value="chinese" />중식</label>
              <label><input type="checkbox" name="categoryOption" value="japanese" />일식</label>
              <label><input type="checkbox" name="categoryOption" value="western" />양식</label>
              <label><input type="checkbox" name="categoryOption" value="cafe" />카페</label>
              <label><input type="checkbox" name="categoryOption" value="bakery" />빵</label>
              <label><input type="checkbox" name="categoryOption" value="bar" />술집</label>
            </div>
            <input id="customCategoryInput" name="customCategory" type="text" placeholder="직접 입력: 예) 분식, 샤브샤브" />
          </fieldset>

          <label>
            주소 또는 장소명
            <div class="input-action-row">
              <input id="addressInput" name="address" type="text" placeholder="예: 서울 성동구 성수동" required />
              <button id="findPlaceButton" class="secondary-button compact-button" type="button">장소 찾기</button>
            </div>
          </label>

          <div class="two-col">
            <label>
              위도
              <input id="latInput" name="lat" type="number" step="0.000001" placeholder="37.5445" />
            </label>
            <label>
              경도
              <input id="lngInput" name="lng" type="number" step="0.000001" placeholder="127.0557" />
            </label>
          </div>

          <label>
            요약
            <textarea id="summaryInput" name="summary" rows="3" placeholder="화면 하단에 보여줄 짧은 내용"></textarea>
          </label>

          <section id="candidateSection" class="candidate-section" hidden>
            <div class="candidate-header">
              <div>
                <p class="eyebrow">장소 후보</p>
                <h3 id="candidateTitle">0개 후보</h3>
              </div>
              <button id="saveCandidatesButton" class="secondary-button compact-button" type="button">선택 저장</button>
            </div>
            <div id="candidateList" class="candidate-list"></div>
          </section>

          <div class="dialog-actions">
            <button id="geocodeButton" class="secondary-button" type="button">주소로 좌표 찾기</button>
            <button id="extractCandidatesButton" class="secondary-button" type="button">요약에서 후보 찾기</button>
            <button id="submitSpotButton" class="primary-button" type="submit">지도에 추가</button>
          </div>
        </form>
      </dialog>
    </main>

    <script src="./config.js"></script>
    <script src="./main.js"></script>
    <script src="./list.js"></script>
    <script>
      (() => {
        const focusLevel = 3;

        function clickedSpotId(event) {
          const item = event.target.closest("[data-list-spot-id], [data-marker-id], [data-id], [data-related-id]");
          if (!item) return "";
          return item.dataset.listSpotId || item.dataset.markerId || item.dataset.relatedId || item.dataset.id || "";
        }

        function focusSpot(spotId) {
          if (!spotId || typeof map === "undefined" || !map || !window.kakao || typeof spots === "undefined") return;

          const spot = spots.find((entry) => entry.id === spotId);
          if (!spot || !Number.isFinite(Number(spot.lat)) || !Number.isFinite(Number(spot.lng))) return;

          const position = new kakao.maps.LatLng(Number(spot.lat), Number(spot.lng));
          const currentLevel = typeof map.getLevel === "function" ? map.getLevel() : focusLevel;
          map.setLevel(Math.min(currentLevel, focusLevel));
          map.panTo(position);
        }

        window.focusSpotOnMap = focusSpot;

        document.addEventListener("click", (event) => {
          const spotId = clickedSpotId(event);
          if (spotId) window.setTimeout(() => focusSpot(spotId), 0);
        });
      })();
    </script>
  </body>
</html>
