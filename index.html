<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SNS Spot Map</title>
    <meta name="theme-color" content="#0f8a63" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./list.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-shell" aria-label="SNS 위치 지도">
        <div id="map" class="map-canvas"></div>
        <div id="fallbackMap" class="fallback-map" aria-hidden="true">
          <div class="map-grid"></div>
          <div class="road road-a"></div>
          <div class="road road-b"></div>
          <div class="river"></div>
          <div id="fallbackPins"></div>
        </div>

        <header class="topbar">
          <div class="brand-chip">
            <p class="eyebrow">SNS Spot Map</p>
            <p class="spot-count-label">저장한 장소</p>
          </div>
          <div class="top-actions">
            <button id="installButton" class="install-button" type="button" hidden>설치</button>
            <button id="openListButton" class="install-button" type="button">목록</button>
            <button id="openComposer" class="icon-button" type="button" aria-label="콘텐츠 추가">+</button>
          </div>
        </header>

        <div class="filterbar collapsed" role="tablist" aria-label="콘텐츠 유형 필터">
          <button class="filter active" type="button" data-filter="all">전체</button>
          <button class="filter" type="button" data-filter="instagram">Instagram</button>
          <button class="filter" type="button" data-filter="blog">Blog</button>
          <button class="filter" type="button" data-filter="cafe">Cafe</button>
          <button class="filter" type="button" data-filter="other">기타</button>
        </div>

        <aside id="status" class="status-pill"></aside>
        <button id="locateButton" class="map-control-button" type="button" aria-label="현재 위치로 이동">⌖</button>
      </section>

      <section id="detailSheet" class="detail-sheet" aria-live="polite">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <div>
            <p id="selectedType" class="eyebrow">선택된 장소</p>
            <h2 id="selectedTitle">성수 브루잉 라운지</h2>
          </div>
          <div class="sheet-actions" aria-label="장소 작업">
            <a id="selectedLink" class="link-button" href="#" target="_blank" rel="noreferrer">원문</a>
            <button id="editSpotButton" class="secondary-button" type="button">수정</button>
            <button id="deleteSpotButton" class="danger-button" type="button">삭제</button>
          </div>
        </div>
        <p id="selectedMeta" class="meta"></p>
        <p id="selectedSummary" class="summary"></p>
        <button id="toggleDetailButton" class="ghost-button detail-toggle" type="button">더보기</button>
        <div id="relatedList" class="related-list"></div>
      </section>

      <aside id="spotListPanel" class="spot-list-panel" aria-label="저장한 장소 목록" hidden>
        <div class="list-panel-header">
          <div>
            <p class="eyebrow">내 저장 장소</p>
            <h2>거리순 목록</h2>
          </div>
          <button id="closeListButton" class="ghost-button" type="button">닫기</button>
        </div>
        <input id="spotSearchInput" class="spot-search-input" type="search" placeholder="식당명, 주소, 업종 검색" />
        <p id="spotListMeta" class="meta"></p>
        <div id="spotList" class="spot-list"></div>
      </aside>

      <dialog id="composer" class="composer">
        <form id="spotForm" method="dialog">
          <div class="dialog-header">
            <div>
              <p class="eyebrow">새 콘텐츠</p>
              <h2 id="composerTitle">링크와 위치 등록</h2>
            </div>
            <button class="ghost-button" value="cancel" type="button" id="closeComposer">닫기</button>
          </div>

          <label>
            원문 링크
            <div class="input-action-row">
              <input id="urlInput" name="url" type="url" placeholder="https://www.instagram.com/p/..." required />
              <button id="analyzeLinkButton" class="secondary-button compact-button" type="button">분석</button>
            </div>
          </label>

          <div class="two-col">
            <label>
              제목
              <input id="titleInput" name="title" type="text" placeholder="장소명 또는 글 제목" required />
            </label>
            <label>
              유형
              <select id="typeInput" name="type">
                <option value="instagram">Instagram</option>
                <option value="blog">Naver Blog</option>
                <option value="cafe">Naver Cafe</option>
                <option value="other">기타</option>
              </select>
            </label>
          </div>

          <fieldset class="category-field">
            <legend>업종</legend>
            <div class="category-options">
              <label><input type="checkbox" name="categoryOption" value="korean" />한식</label>
              <label><input type="checkbox" name="categoryOption" value="chinese" />중식</label>
              <label><input type="checkbox" name="categoryOption" value="japanese" />일식</label>
              <label><input type="checkbox" name="categoryOption" value="western" />양식</label>
              <label><input type="checkbox" name="categoryOption" value="cafe" />카페</label>
              <label><input type="checkbox" name="categoryOption" value="bakery" />빵</label>
              <label><input type="checkbox" name="categoryOption" value="bar" />술집</label>
            </div>
            <input id="customCategoryInput" name="customCategory" type="text" placeholder="직접 입력: 예) 분식, 샤브샤브" />
          </fieldset>

          <label>
            주소 또는 장소명
            <div class="input-action-row">
              <input id="addressInput" name="address" type="text" placeholder="예: 서울 성동구 성수동" required />
              <button id="findPlaceButton" class="secondary-button compact-button" type="button">장소 찾기</button>
            </div>
          </label>

          <div class="two-col">
            <label>
              위도
              <input id="latInput" name="lat" type="number" step="0.000001" placeholder="37.5445" />
            </label>
            <label>
              경도
              <input id="lngInput" name="lng" type="number" step="0.000001" placeholder="127.0557" />
            </label>
          </div>

          <label>
            요약
            <textarea id="summaryInput" name="summary" rows="3" placeholder="화면 하단에 보여줄 짧은 내용"></textarea>
          </label>

          <section id="candidateSection" class="candidate-section" hidden>
            <div class="candidate-header">
              <div>
                <p class="eyebrow">장소 후보</p>
                <h3 id="candidateTitle">0개 후보</h3>
              </div>
              <button id="saveCandidatesButton" class="secondary-button compact-button" type="button">선택 저장</button>
            </div>
            <div id="candidateList" class="candidate-list"></div>
          </section>

          <div class="dialog-actions">
            <button id="geocodeButton" class="secondary-button" type="button">주소로 좌표 찾기</button>
            <button id="extractCandidatesButton" class="secondary-button" type="button">요약에서 후보 찾기</button>
            <button id="submitSpotButton" class="primary-button" type="submit">지도에 추가</button>
          </div>
        </form>
      </dialog>
    </main>

    <script src="./config.js"></script>
    <script src="./main.js"></script>
    <script src="./list.js"></script>
    <script>
      (() => {
        const focusLevel = 3;

        function clickedSpotId(event) {
          const item = event.target.closest("[data-list-spot-id], [data-marker-id], [data-id], [data-related-id]");
          if (!item) return "";
          return item.dataset.listSpotId || item.dataset.markerId || item.dataset.relatedId || item.dataset.id || "";
        }

        function focusSpot(spotId) {
          if (!spotId || typeof map === "undefined" || !map || !window.kakao || typeof spots === "undefined") return;

          const spot = spots.find((entry) => entry.id === spotId);
          if (!spot || !Number.isFinite(Number(spot.lat)) || !Number.isFinite(Number(spot.lng))) return;

          const position = new kakao.maps.LatLng(Number(spot.lat), Number(spot.lng));
          const currentLevel = typeof map.getLevel === "function" ? map.getLevel() : focusLevel;
          map.setLevel(Math.min(currentLevel, focusLevel));
          map.panTo(position);
        }

        window.focusSpotOnMap = focusSpot;

        function normalizedText(value = "") {
          return String(value || "")
            .toLowerCase()
            .replace(/\s+/g, "")
            .replace(/[()［］\[\]{}'"‘’“”·.,_-]/g, "");
        }

        function isSamePlace(a, b) {
          if (!a || !b || a.id === b.id) return false;

          const titleA = normalizedText(a.title);
          const titleB = normalizedText(b.title);
          const addressA = normalizedText(a.address);
          const addressB = normalizedText(b.address);
          const sameTitle = titleA && titleB && titleA === titleB;
          const sameAddress = addressA && addressB && (addressA === addressB || addressA.includes(addressB) || addressB.includes(addressA));
          const closeCoordinates = Math.abs(Number(a.lat) - Number(b.lat)) < 0.00025
            && Math.abs(Number(a.lng) - Number(b.lng)) < 0.00025;

          return sameAddress || (sameTitle && closeCoordinates);
        }

        function samePlaceGroup(a, b) {
          return Boolean(a && b && (a.id === b.id || isSamePlace(a, b)));
        }

        function groupedSpotsForMap() {
          if (typeof filteredSpots !== "function") return [];
          const groups = [];

          filteredSpots().forEach((spot) => {
            const group = groups.find((items) => items.some((item) => samePlaceGroup(item, spot)));
            if (group) {
              group.push(spot);
            } else {
              groups.push([spot]);
            }
          });

          return groups.map((group) => group.find((spot) => spot.id === activeSpotId) || group[0]);
        }

        if (typeof samePlace === "function") {
          samePlace = isSamePlace;
        }

        if (typeof spotSearchText === "function") {
          spotSearchText = (spot) => [
            spot.title,
            spot.address,
            categoryText(spot.category),
            String(spot.category || "").split(",").map((item) => item.trim()).includes("other") ? "기타" : "",
            typeLabels[spot.type],
            spot.summary
          ].filter(Boolean).join(" ").toLowerCase();
        }

        function safeHtml(value = "") {
          if (typeof escapeHtml === "function") return escapeHtml(value);
          return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }

        if (typeof renderRelatedItem === "function") {
          renderRelatedItem = (spot) => `
            <a class="related-item related-link-item" href="${safeHtml(spot.url || "#")}" target="_blank" rel="noreferrer">
              <span class="badge ${typeClass[spot.type] || ""}">${typeLabels[spot.type] || "SNS"}</span>
              <span class="category-chip">${categoryText(spot.category)}</span>
              <span class="related-link-copy">
                <strong>${safeHtml(spot.title)}</strong>
                <small>추가된 링크 열기</small>
              </span>
            </a>
          `;
        }

        if (typeof selectSpot === "function") {
          const originalSelectSpot = selectSpot;
          selectSpot = (spotId) => {
            originalSelectSpot(spotId);
            if (typeof spots === "undefined" || !Array.isArray(spots) || !activeSpotId) return;

            const selected = spots.find((spot) => spot.id === activeSpotId);
            const relatedList = document.querySelector("#relatedList");
            if (!selected || !relatedList) return;

            const selectedTitle = normalizedText(selected.title);
            const related = spots.filter((spot) => {
              if (spot.id === selected.id || spot.url === selected.url) return false;
              return isSamePlace(selected, spot) || (selectedTitle && selectedTitle === normalizedText(spot.title));
            });
            relatedList.innerHTML = related.length ? related.map(renderRelatedItem).join("") : "";
          };
        }

        if (typeof renderFallbackPins === "function") {
          renderFallbackPins = () => {
            const list = groupedSpotsForMap();
            const fallbackPins = document.querySelector("#fallbackPins");
            if (!fallbackPins) return;

            fallbackPins.innerHTML = list.map((spot) => {
              const x = Math.max(7, Math.min(93, ((spot.lng - 126.2) / 1.2) * 100));
              const y = Math.max(8, Math.min(85, (1 - (spot.lat - 33.1) / 4.8) * 100));
              return `
                <button class="fallback-pin cat-${primaryCategory(spot)} ${spot.id === activeSpotId ? "active" : ""}"
                  type="button"
                  data-id="${spot.id}"
                  style="left:${x}%; top:${y}%"
                  aria-label="${spot.title}">
                  <span>${categoryIcon(spot.category)}</span>
                </button>
              `;
            }).join("");
          };
        }

        if (typeof renderKakaoMarkers === "function") {
          renderKakaoMarkers = () => {
            if (!map || !window.kakao) return;

            if (Array.isArray(markers)) {
              markers.forEach((marker) => marker.setMap(null));
              markers = [];
            }

            const list = groupedSpotsForMap();
            const bounds = new kakao.maps.LatLngBounds();

            list.forEach((spot) => {
              const position = new kakao.maps.LatLng(spot.lat, spot.lng);
              const marker = new kakao.maps.CustomOverlay({
                map,
                position,
                yAnchor: 1,
                content: `
                  <button class="kakao-category-marker cat-${primaryCategory(spot)} ${spot.id === activeSpotId ? "active" : ""}" type="button" data-marker-id="${spot.id}" title="${spot.title}">
                    ${categoryIcon(spot.category)}
                  </button>
                `
              });
              markers.push(marker);
              bounds.extend(position);
            });

            if (markers.length > 1 && !activeSpotId) map.setBounds(bounds);
            if (markers.length === 1 && !activeSpotId) map.setCenter(new kakao.maps.LatLng(list[0].lat, list[0].lng));
          };
        }

        function toggleDetailSheet() {
          const sheet = document.querySelector("#detailSheet");
          const button = document.querySelector("#toggleDetailButton");
          if (!sheet || !button) return;

          const expanded = sheet.classList.toggle("expanded");
          button.textContent = expanded ? "접기" : "더보기";
        }

        document.addEventListener("click", (event) => {
          if (event.target.closest("#toggleDetailButton, .sheet-handle")) {
            event.preventDefault();
            event.stopPropagation();
            toggleDetailSheet();
            return;
          }

          const spotId = clickedSpotId(event);
          if (spotId) window.setTimeout(() => focusSpot(spotId), 0);
        }, true);

        document.addEventListener("submit", () => {
          window.setTimeout(() => focusSpot(activeSpotId), 250);
        }, true);

        document.addEventListener("click", (event) => {
          if (event.target.closest("#saveCandidatesButton")) {
            window.setTimeout(() => focusSpot(activeSpotId), 500);
          }
        });
      })();
    </script>
  </body>
</html>
